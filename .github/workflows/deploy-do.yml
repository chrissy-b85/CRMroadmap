name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build & push backend image
        run: |
          docker build -f backend/Dockerfile.prod -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-backend:${{ github.sha }} backend
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-backend:${{ github.sha }}
          docker tag registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-backend:${{ github.sha }} registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-backend:latest
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-backend:latest

      - name: Build & push frontend image
        run: |
          docker build -f frontend/Dockerfile.prod -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-frontend:${{ github.sha }} frontend
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-frontend:${{ github.sha }}
          docker tag registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-frontend:${{ github.sha }} registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-frontend:latest
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/ndis-crm-frontend:latest

      - name: Deploy to App Platform
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} --spec infra/do/app.yaml
